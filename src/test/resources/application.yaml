spring:
  application:
    name: expin-backend-test
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:expin-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

security:
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: test-secret-for-integration-tests-must-have-enough-length
    session-expiration-minutes: 15
    refresh-expiration-minutes: 30
