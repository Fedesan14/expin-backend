spring:
  application:
    name: expin-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${DATABASE_HOST}:${DATABASE_PORT}/expin?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}
    session-expiration-minutes: ${JWT_SESSION_EXPIRATION_MINUTES:15}
    refresh-expiration-minutes: ${JWT_REFRESH_EXPIRATION_MINUTES:30}
